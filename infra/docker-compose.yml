# Local development stack for AI-LMS.
# Only the services needed for P1 are enabled (postgres, redis, traefik).
# Ollama / MongoDB will be added in the phase that actually needs them.
#
# Usage:
#   cd /home/root/lms-project
#   docker compose -f infra/docker-compose.yml up -d
#
# Traefik routes http://api.localhost → api-core, http://localhost → web.
# Add those hosts to /etc/hosts if not using dnsmasq:
#   127.0.0.1  localhost api.localhost

name: lms-dev

networks:
  # In dev we intentionally run both networks WITHOUT `internal: true` so that
  # host-side tooling (prisma migrate, psql, redis-cli) can reach the ports
  # we publish. The production compose restores strict isolation — see
  # infra/docker-compose.prod.yml when it lands.
  lms-edge:
    name: lms-edge
  lms-data:
    name: lms-data

volumes:
  pgdata:
  redisdata:
  ollamadata:

services:

  traefik:
    image: traefik:v3.2
    container_name: lms-traefik
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8081:8080" # dashboard — localhost only
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      # Cloudflare Origin cert + key mounted from /opt/lms/secrets on host.
      # These are 600 on host and NEVER committed to git.
      - /opt/lms/secrets/cloudflare-origin.pem:/etc/traefik/certs/cloudflare-origin.pem:ro
      - /opt/lms/secrets/cloudflare-origin.key:/etc/traefik/certs/cloudflare-origin.key:ro
    # host-gateway lets the file-provider routers reach native node processes
    # on the host (api-core :4000, web :3000) while they are not yet
    # containerised.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [lms-edge]

  postgres:
    # pgvector/pgvector:pg16 is the upstream Postgres 16 image with the
    # `vector` extension preinstalled. Identical to postgres:16 otherwise.
    # Switch back to postgres:16-alpine only if we remove pgvector from
    # prisma/schema.prisma.
    image: pgvector/pgvector:pg16
    container_name: lms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lms}
      POSTGRES_USER: ${POSTGRES_USER:-lms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-prod}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5432:5432" # Exposed on host for local Prisma migrate / psql
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lms} -d ${POSTGRES_DB:-lms}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [lms-data]

  ollama:
    # Self-hosted Llama 3 8B Q4 via Ollama. CPU-only on 8 vCPU → ~10-20
    # tok/s, so SSE streaming is non-negotiable on the UI side.
    # OLLAMA_NUM_PARALLEL=1 keeps inference serialised (parallel eats
    # the same CPU pool and makes p95 worse).
    # OLLAMA_KEEP_ALIVE=24h avoids the 60-second cold-start model reload.
    image: ollama/ollama:latest
    container_name: lms-ollama
    restart: unless-stopped
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_HOST: "0.0.0.0:11434"
    volumes:
      - ollamadata:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:11434/api/version || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
    networks: [lms-edge]

  redis:
    image: redis:7-alpine
    container_name: lms-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379" # Exposed for dev tooling
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [lms-data]
