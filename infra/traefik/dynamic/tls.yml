# TLS certificate + default options.
# The cert + key are mounted from /opt/lms/secrets/ on the host into the
# container at /etc/traefik/certs/. They are NOT committed to git.

tls:
  certificates:
    - certFile: /etc/traefik/certs/cloudflare-origin.pem
      keyFile: /etc/traefik/certs/cloudflare-origin.key
      stores:
        - default

  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
      sniStrict: false

  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/cloudflare-origin.pem
        keyFile: /etc/traefik/certs/cloudflare-origin.key
